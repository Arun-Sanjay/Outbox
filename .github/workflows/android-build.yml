name: Android Build Test

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  typecheck:
    name: TypeScript Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci --legacy-peer-deps
      - run: npx tsc --noEmit

  build:
    name: Android Bundle
    runs-on: ubuntu-latest
    needs: typecheck
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci --legacy-peer-deps
      - run: npx expo export --platform android --output-dir dist
      - uses: actions/upload-artifact@v4
        with:
          name: android-bundle
          path: dist/
          retention-days: 7

  test:
    name: Unit Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci --legacy-peer-deps
      - name: Run all test scripts
        run: |
          failed=0
          for f in scripts/test-*.mjs; do
            echo "=========================================="
            echo "Running: $f"
            echo "=========================================="
            if ! node "$f"; then
              failed=1
            fi
          done
          if [ $failed -ne 0 ]; then
            echo "SOME TESTS FAILED"
            exit 1
          fi
          echo "ALL TEST SUITES PASSED"
